<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UID Collector — Simple NFC Tools</title>
<style>
  :root {
    --bg: #f5f5f5; --fg: #1e293b; --muted: #64748b;
    --surface: #fff; --surface-border: #e2e8f0;
    --banner-idle-bg: #e2e8f0; --banner-idle-fg: #64748b;
    --list-border: #e2e8f0; --list-item-fg: #334155; --list-num: #94a3b8;
    --scan-border: #d1d5db; --scan-fg: #64748b;
    --copy-bg: #2563eb; --copy-disabled-bg: #93c5fd; --copy-disabled-fg: #c7d2fe;
    --clear-bg: #e2e8f0; --clear-fg: #64748b; --clear-disabled-bg: #f1f5f9; --clear-disabled-fg: #cbd5e1;
    --toggle-bg: #e2e8f0; --toggle-fg: #475569;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --fg: #e2e8f0; --muted: #64748b;
    --surface: #1e293b; --surface-border: #334155;
    --banner-idle-bg: #1e293b; --banner-idle-fg: #64748b;
    --list-border: #334155; --list-item-fg: #cbd5e1; --list-num: #475569;
    --scan-border: #334155; --scan-fg: #94a3b8;
    --copy-bg: #2563eb; --copy-disabled-bg: #1e3a5f; --copy-disabled-fg: #475569;
    --clear-bg: #334155; --clear-fg: #94a3b8; --clear-disabled-bg: #1e293b; --clear-disabled-fg: #334155;
    --toggle-bg: #334155; --toggle-fg: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0f172a; --fg: #e2e8f0; --muted: #64748b;
      --surface: #1e293b; --surface-border: #334155;
      --banner-idle-bg: #1e293b; --banner-idle-fg: #64748b;
      --list-border: #334155; --list-item-fg: #cbd5e1; --list-num: #475569;
      --scan-border: #334155; --scan-fg: #94a3b8;
      --copy-bg: #2563eb; --copy-disabled-bg: #1e3a5f; --copy-disabled-fg: #475569;
      --clear-bg: #334155; --clear-fg: #94a3b8; --clear-disabled-bg: #1e293b; --clear-disabled-fg: #334155;
      --toggle-bg: #334155; --toggle-fg: #94a3b8;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 1rem;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  .back { display: inline-block; color: var(--muted); text-decoration: none; font-size: 0.85rem; margin-bottom: 0.75rem; }
  .back:hover { color: var(--fg); }
  h1 { font-size: 1.1rem; text-align: center; color: var(--muted); margin-bottom: 1rem; }

  #banner {
    text-align: center;
    padding: 1.25rem 1rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    transition: opacity 0.3s;
    min-height: 4.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #banner.idle { background: var(--banner-idle-bg); color: var(--banner-idle-fg); }
  #banner.success { background: #166534; color: #bbf7d0; }
  #banner.duplicate { background: #92400e; color: #fef3c7; }
  #banner.error { background: #7f1d1d; color: #fecaca; }
  #banner .uid { font-family: monospace; font-size: 0.95rem; margin-top: 0.25rem; font-weight: 400; }

  #count { text-align: center; font-size: 2.5rem; font-weight: 700; margin: 1rem 0 0.25rem; }
  #count-label { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }

  #list {
    list-style: none;
    background: var(--surface);
    border-radius: 10px;
    max-height: 35vh;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  #list:empty { display: none; }
  #list li {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--list-border);
    font-family: monospace;
    font-size: 0.85rem;
    color: var(--list-item-fg);
    display: flex;
    justify-content: space-between;
  }
  #list li:last-child { border-bottom: none; }
  #list li .num { color: var(--list-num); font-size: 0.75rem; }
  #list li.flash { animation: flash 0.8s; }
  @keyframes flash { 0% { background: #166534; } 100% { background: transparent; } }

  .actions { display: flex; gap: 0.5rem; }
  .actions button {
    flex: 1;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #copy-btn { background: var(--copy-bg); color: #fff; }
  #copy-btn:disabled { background: var(--copy-disabled-bg); color: var(--copy-disabled-fg); }
  #clear-btn { background: var(--clear-bg); color: var(--clear-fg); }
  #clear-btn:disabled { background: var(--clear-disabled-bg); color: var(--clear-disabled-fg); }

  #scan-btn {
    display: block;
    width: 100%;
    padding: 0.65rem;
    margin-bottom: 1rem;
    font-size: 0.85rem;
    border: 2px solid var(--scan-border);
    border-radius: 10px;
    background: transparent;
    color: var(--scan-fg);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  #scan-btn.scanning { border-color: #16a34a; color: #4ade80; }
  #scan-btn.scanning::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-right: 0.5rem; animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--copy-bg);
    color: #fff;
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  #theme-toggle {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 8px;
    background: var(--toggle-bg);
    color: var(--toggle-fg);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="Toggle theme"></button>

<a href="../" class="back">&larr; All Tools</a>
<h1>UID Collector</h1>

<button id="scan-btn">Tap to start scanning</button>

<div id="banner" class="idle">Hold a token to your phone</div>

<div id="count">0</div>
<p id="count-label">unique tokens collected</p>

<ul id="list"></ul>

<div class="actions">
  <button id="copy-btn" disabled>Copy All UIDs</button>
  <button id="clear-btn" disabled>Clear</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* Theme toggle */
const toggle = document.getElementById('theme-toggle');
const root = document.documentElement;

function getEffectiveTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  root.setAttribute('data-theme', theme);
  toggle.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

applyTheme(getEffectiveTheme());

toggle.addEventListener('click', () => {
  const next = getEffectiveTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
});

/* NFC scanner */
const scanBtn = document.getElementById('scan-btn');
const banner = document.getElementById('banner');
const countEl = document.getElementById('count');
const list = document.getElementById('list');
const copyBtn = document.getElementById('copy-btn');
const clearBtn = document.getElementById('clear-btn');
const toastEl = document.getElementById('toast');

const uids = [];
const uidSet = new Set();
let scanning = false;
let abortController = null;
let bannerTimeout = null;

function showBanner(type, line1, line2) {
  clearTimeout(bannerTimeout);
  banner.className = type;
  banner.innerHTML = line1 + (line2 ? `<div class="uid">${line2}</div>` : '');
  if (type !== 'idle') {
    bannerTimeout = setTimeout(() => {
      banner.className = 'idle';
      banner.innerHTML = scanning ? 'Ready — hold next token' : 'Hold a token to your phone';
    }, 2000);
  }
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1500);
}

function updateUI() {
  countEl.textContent = uids.length;
  copyBtn.disabled = uids.length === 0;
  clearBtn.disabled = uids.length === 0;
}

function addUID(uid) {
  if (uidSet.has(uid)) {
    showBanner('duplicate', 'Duplicate — already collected', uid);
    return;
  }
  uidSet.add(uid);
  uids.push(uid);

  const li = document.createElement('li');
  li.innerHTML = `<span>${uid}</span><span class="num">#${uids.length}</span>`;
  li.classList.add('flash');
  list.prepend(li);

  showBanner('success', 'Token added!', uid);
  updateUI();
}

async function startScan() {
  if (!('NDEFReader' in window)) {
    showBanner('error', 'WebNFC not supported', 'Use Chrome on Android');
    return;
  }

  try {
    abortController = new AbortController();
    const reader = new NDEFReader();
    await reader.scan({ signal: abortController.signal });

    scanning = true;
    scanBtn.textContent = 'Scanning active';
    scanBtn.classList.add('scanning');
    showBanner('idle', 'Ready — hold next token');

    reader.onreading = (event) => {
      const uid = event.serialNumber.toUpperCase();
      addUID(uid);
    };

    reader.onreadingerror = () => {
      showBanner('error', 'Read error — try again', '');
    };
  } catch (err) {
    showBanner('error', 'Could not start scanner', err.message);
  }
}

function stopScan() {
  if (abortController) abortController.abort();
  scanning = false;
  scanBtn.textContent = 'Tap to start scanning';
  scanBtn.classList.remove('scanning');
  showBanner('idle', 'Scanning stopped');
}

scanBtn.addEventListener('click', () => {
  scanning ? stopScan() : startScan();
});

copyBtn.addEventListener('click', async () => {
  const text = uids.join('\n');
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  showToast(`Copied ${uids.length} UIDs`);
});

clearBtn.addEventListener('click', () => {
  uids.length = 0;
  uidSet.clear();
  list.innerHTML = '';
  updateUI();
  showBanner('idle', scanning ? 'Ready — hold next token' : 'Hold a token to your phone');
});
</script>

</body>
</html>

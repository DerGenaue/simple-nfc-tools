<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple NFC Tools</title>
<style>
  :root {
    --bg: #f5f5f5; --fg: #1e293b; --muted: #64748b;
    --card-bg: #fff; --card-border: #e2e8f0; --card-hover-bg: #eff6ff; --card-hover-border: #2563eb;
    --toggle-bg: #e2e8f0; --toggle-fg: #475569;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --fg: #e2e8f0; --muted: #64748b;
    --card-bg: #1e293b; --card-border: #334155; --card-hover-bg: #1e3a5f; --card-hover-border: #2563eb;
    --toggle-bg: #334155; --toggle-fg: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0f172a; --fg: #e2e8f0; --muted: #64748b;
      --card-bg: #1e293b; --card-border: #334155; --card-hover-bg: #1e3a5f; --card-hover-border: #2563eb;
      --toggle-bg: #334155; --toggle-fg: #94a3b8;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem 1rem;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .tools { display: flex; flex-direction: column; gap: 0.75rem; }
  .tool-card {
    display: block;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 1.25rem;
    text-decoration: none;
    color: var(--fg);
    transition: border-color 0.2s, background 0.2s;
  }
  .tool-card:hover { border-color: var(--card-hover-border); background: var(--card-hover-bg); }
  .tool-card h2 { font-size: 1.1rem; margin-bottom: 0.35rem; }
  .tool-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.4; }

  #theme-toggle {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 8px;
    background: var(--toggle-bg);
    color: var(--toggle-fg);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="Toggle theme"></button>

<h1>Simple NFC Tools</h1>
<p class="subtitle">Browser-based NFC utilities using WebNFC</p>

<div class="tools">
  <a href="uid-collector/" class="tool-card">
    <h2>UID Collector</h2>
    <p>Scan NFC tokens one after another, de-duplicate, and copy all unique UIDs to clipboard.</p>
  </a>
</div>

<script>
const toggle = document.getElementById('theme-toggle');
const root = document.documentElement;

function getEffectiveTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  root.setAttribute('data-theme', theme);
  toggle.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

applyTheme(getEffectiveTheme());

toggle.addEventListener('click', () => {
  const next = getEffectiveTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
});
</script>

</body>
</html>
